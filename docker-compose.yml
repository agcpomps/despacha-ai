services:
  postgres:
    image: postgres:16
    container_name: despacha_ai_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: despacha_ai
    ports:
      - "5432:5432"
    volumes:
      - despacha_ai_pgdata:/var/lib/postgresql/data
    networks:
      - despacha_ai_network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d despacha_ai"]
      interval: 5s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: despacha_ai_api
    restart: unless-stopped
    ports:
      - "8080:8080"
    env_file:
      - ./backend/.env
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - despacha_ai_network

volumes:
  despacha_ai_pgdata:

networks:
  despacha_ai_network:
    driver: bridge